<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Game Hub</title>
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div id="main-menu">
            <header>
                <h1>🎮 Fun Game Hub</h1>
                <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
                    <div onclick="editName()" style="cursor: pointer; display: flex; align-items: center; gap: 5px;"
                        title="Klik untuk ganti nama">
                        <span id="user-display" style="font-weight: bold; color: var(--text-color);"></span>
                        <small id="edit-label"
                            style="font-size: 0.7rem; color: #3498db; text-decoration: underline; display: none;">(Ganti)</small>
                    </div>
                    <button id="theme-toggle" onclick="toggleTheme()">🌙 Mode Gelap</button>
                </div>
            </header>

            <div id="name-input-area"
                style="text-align: center; margin: 20px 0; padding: 20px; background: rgba(0,0,0,0.05); border-radius: 10px;">
                <h2 style="margin-bottom: 10px; font-size: 1.1rem;">Halo! Siapa namamu?</h2>
                <input type="text" id="username-input" placeholder="Ketik nama di sini..."
                    style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 200px;">
                <button onclick="saveName()"
                    style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Mulai</button>
            </div>

            <div class="game-grid" id="menu-grid"></div>
        </div>

        <div id="game-area" class="hidden">
            <div class="game-nav">
                <button class="btn-back" onclick="goHome()">⬅ Menu Utama</button>
                <div id="game-stats">Skor: 0</div>
            </div>
            <div id="game-canvas-wrapper"></div>
        </div>
    </div>

    <script src="games/typing.js"></script>
    <script src="games/bug.js"></script>
    <script src="games/memory.js"></script>
    <script src="games/code.js"></script>
    <script src="games/snake.js"></script>
    <script src="games/tictactoe.js"></script>
    <script src="games/math.js"></script>
    <script src="games/whacamole.js"></script>
    <script src="games/color.js"></script>
    <script src="games/dino.js"></script>
    <script src="games/subtraction.js"></script>
    <script src="games/multiplication.js"></script>
    <script src="games/division.js"></script>
    <script src="games/drawing.js"></script>
    <script src="games/flappy.js"></script>
    <script src="games/2048.js"></script>
    <script src="games/stack.js"></script>
    <script src="games/bricks.js"></script>
    <script src="games/tetris.js"></script>
    <script src="games/knife.js"></script>
    <script src="games/racer.js"></script>
    <script src="games/miner.js"></script>
    <script src="games/minesweeper.js"></script>
    <script src="games/simon.js"></script>
    <script src="games/jigsaw.js"></script>
    <script src="games/ular_tangga.js"></script>
    <script src="games/tebak_koin.js"></script>
    <script src="games/suit.js"></script>
    <script src="games/word_scramble.js"></script>
    <script src="games/tower_defense.js"></script>
    <script src="games/sudoku.js"></script>
    <script src="games/rhythm.js"></script>
    <script src="games/hole.js"></script>
    <script src="games/liquid_sort.js"></script>
    <script src="games/lunar_lander.js"></script>
    <script src="games/piano_hero.js"></script>
    <script src="games/math_quest.js"></script>
    <script src="games/math_story.js"></script>
    <script src="games/gravity_switcher.js"></script>
    <script src="games/light_reflector.js"></script>

    <script src="main.js"></script>
</body>

</html>
