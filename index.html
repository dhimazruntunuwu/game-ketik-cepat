<script>
    // Daftar paragraf/cerita pendek
    const stories = [
        "Kotlin is a modern programming language that makes developers happier.",
        "Android Studio is the official IDE for Android app development based on IntelliJ IDEA.",
        "Jetpack Compose is a modern toolkit for building native UI on Android platforms.",
        "The quick brown fox jumps over the lazy dog in the middle of the night.",
        "Coding is not just about writing lines of code but solving complex problems."
    ];

    let currentStory = "", score = 0, timeLeft = 60; // Waktu saya tambah jadi 60 detik
    
    const wordDisplay = document.getElementById('word');
    const inputField = document.getElementById('input');
    const scoreDisplay = document.getElementById('score');

    // Mengatur tampilan font agar lebih rapi untuk paragraf
    wordDisplay.style.fontSize = "1.5rem";
    wordDisplay.style.lineHeight = "1.6";
    wordDisplay.style.maxWidth = "600px";
    wordDisplay.style.margin = "20px auto";
    inputField.style.width = "80%";

    function nextStory() {
        currentStory = stories[Math.floor(Math.random() * stories.length)];
        wordDisplay.innerText = currentStory;
        inputField.value = ''; // Kosongkan input setiap ganti cerita
    }

    inputField.addEventListener('input', () => {
        const val = inputField.value;
        
        // Cek apakah yang diketik sudah sama persis dengan kalimat target
        if (val === currentStory) {
            score += currentStory.split(' ').length; // Skor berdasarkan jumlah kata
            nextStory();
            updateDisplay();
        }
        
        // Fitur tambahan: Warnai teks jadi merah jika salah ketik tengah jalan
        if (currentStory.startsWith(val)) {
            inputField.style.borderColor = "#ddd";
        } else {
            inputField.style.borderColor = "red";
        }
    });

    function updateDisplay() {
        scoreDisplay.innerText = `Total Kata: ${score} | Waktu: ${timeLeft}s`;
    }

    const timer = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
            clearInterval(timer);
            alert(`Waktu Habis! Kamu berhasil mengetik ${score} kata.`);
            location.reload();
        }
    }, 1000);

    nextStory();
</script>
