<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Game Hub</title>
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
</head>

<body>
    <div id="name-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>👋 Halo Gamer!</h2>
            <p>Masukkan namamu untuk mencatat skor di Leaderboard.</p>
            <input type="text" id="username-input" placeholder="Nama kamu..." maxlength="15" autocomplete="off">
            <button onclick="saveName()">Mulai Bermain</button>
        </div>
    </div>

    <div class="container">
        <div id="main-menu">
            <header>
                <div class="header-left">
                    <h1>🎮 Fun Game Hub</h1>
                </div>
                <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
                    <div onclick="editName()" style="cursor: pointer; text-align: right;">
                        <span id="user-display" style="font-weight: bold; display: block;"></span>
                        <small id="edit-label"
                            style="color: #3498db; text-decoration: underline; font-size: 0.75rem;">(Ganti Nama)</small>
                    </div>
                    <button id="theme-toggle" onclick="toggleTheme()">🌙 Mode Gelap</button>
                </div>
            </header>

            <div id="menu-grid"></div>

            <div id="suggestion-box" class="suggestion-container">
                <h3>📝 Kotak Saran</h3>
                <p>Punya ide game baru atau kritik? Tulis di bawah ya!</p>
                <textarea id="suggestion-input" placeholder="Tulis saranmu di sini..."></textarea>
                <button id="send-suggestion-btn" onclick="submitSaran()">Kirim Saran</button>
            </div>
            </div>

        <div id="game-area" class="hidden">
            <div class="game-nav">
                <button class="btn-back" onclick="goHome()">⬅ Menu Utama</button>
                <div id="game-stats">Skor: 0</div>
            </div>
            <div id="game-canvas-wrapper"></div>
        </div>
    </div>

    <script>
        // Trigger save saat tekan Enter di input nama
        document.getElementById('username-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') saveName();
        });

        // Service Worker Logic
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    setInterval(() => { reg.update(); }, 1000 * 60 * 60);
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                installingWorker.postMessage({ action: 'skipWaiting' });
                            }
                        };
                    };
                });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
